# Local Postgres for integration tests and the smoke check.
# pgvector/pgvector (not stock postgres) because 0001 creates the vector
# extension — matching pg-main's CNPG image, which ships pgvector.
services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ops
      POSTGRES_PASSWORD: ops
      POSTGRES_DB: ops
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops -d ops"]
      interval: 2s
      timeout: 2s
      retries: 15

  # Broker for fleet integration tests — production Mosquitto (192.168.50.45)
  # must never be touched by tests (retained messages are global state there).
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1884:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t healthcheck -m ok"]
      interval: 2s
      timeout: 2s
      retries: 15
